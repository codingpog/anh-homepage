name: Build and Push Docker Image to Docker Hub CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  publish-images:

    runs-on: ubuntu-latest

    steps:
    - name: checkout 
      uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . -t vuanhkhoa2/anhhomepage:latest
    - name: Push image to Docker Hub
      run: |
        docker login -u vuanhkhoa2 -p ${{ secrets.DOCKER_HUB_TOKEN }}
        docker push vuanhkhoa2/anhhomepage:latest
