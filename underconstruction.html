<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="/css/style.css" />
    <title>MyHomePage</title>
  </head>
  <body>
    <header>
      <picture>
        <source
          srcset="/images/saucer.webp"
          media="(prefers-reduced-motion: no-preference)"
        />
        <img src="/images/saucer.png" alt="Saucer" />
      </picture>
      <div class="wordart purple">
        <a class="text" href="/"> ANH'S HOMEPAGE </a>
      </div>
      <picture>
        <source
          srcset="/images/welcome.webp"
          media="(prefers-reduced-motion: no-preference)"
        />
        <img src="/images/welcome.png" alt="Welcome" />
      </picture>
    </header>
    <main>
      <nav class="navbar">
        <div class="top">
          <span class="dot"></span>
        </div>
        <div class="navcontent">
          <a class="navlink" href="/">About</a>
          <a class="navlink" href="/interests">Interests</a>
          <a class="navlink" href="/willanhhitthecorner"
            >WillAnhHitTheCorner?</a
          >
        </div>
      </nav>
      <div class="construction">
        <p>This page is</p>
        <picture>
          <source
            srcset="/images/consbar.gif"
            media="(prefers-reduced-motion: no-preference)"
          />
          <img src="/images/consbar.png" alt="under-construction" />
        </picture>
        <picture>
          <source
            srcset="/images/flames.gif"
            media="(prefers-reduced-motion: no-preference)"
          />
          <img src="/images/flames.png" alt="flames" />
        </picture>
      </div>
    </main>
    <footer class="footer">
      <div class="footer-content">
        <marquee>
          <p style="color: #da019d">
            Copyright © 2026 Anh's Homepage. All rights reserved.
          </p>
        </marquee>
        <nav aria-label="contacts" class="footer-links">
          <a
            href="https://www.linkedin.com/in/anh-khoa-vu"
            target="_blank"
            rel="noopener noreferrer"
          >
            <picture>
              <img
                src="/images/linkedin.png"
                alt="LinkedIn"
                height="40px"
                width="40px"
              />
            </picture>
          </a>
          <a
            href="https://github.com/codingpog"
            target="_blank"
            rel="noopener noreferrer"
          >
            <picture>
              <source
                srcset="/images/github.gif"
                media="(prefers-reduced-motion: no-preference)"
              />
              <img
                src="/images/github.png"
                alt="GitHub"
                height="40px"
                width="40px"
              />
            </picture>
          </a>
        </nav>
      </div>
    </footer>
  </body>
</html>
