<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="/css/style.css" />
    <title>MyHomePage</title>
  </head>
  <body onload="runner()">
    <header>
      <picture>
        <source
          srcset="/images/saucer.webp"
          media="(prefers-reduced-motion: no-preference)"
        />
        <img src="/images/saucer.png" alt="Saucer" />
      </picture>
      <div class="wordart purple">
        <a class="text" href="/"> ANH'S HOMEPAGE </a>
      </div>
      <picture>
        <source
          srcset="/images/welcome.webp"
          media="(prefers-reduced-motion: no-preference)"
        />
        <img src="/images/welcome.png" alt="Welcome" />
      </picture>
    </header>
    <main>
      <nav class="navbar" id="navbar">
        <div class="top">
          <span class="dot" onclick="closeWindow()"></span>
        </div>
        <div class="navcontent">
          <a class="navlink" href="/">About</a>
          <a class="navlink" href="/interests">Interests</a>
          <a class="navlink" href="/willanhhitthecorner"
            >WillAnhHitTheCorner?</a
          >
        </div>
      </nav>

      <a
        href="https://www.pokemon.com/us/pokedex/dragonite"
        target="_blank"
        rel="noopener noreferrer"
      >
        <picture>
          <source
            srcset="/images/dragonite.webp"
            media="(prefers-reduced-motion: no-preference)"
          />
          <img src="/images/dragonite.png" alt="Dragonite" />
        </picture>
      </a>

      <article class="content">
        <div class="top">
          <a
            class="dot"
            href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1"
            target="_blank"
            rel="noopener noreferrer"
          ></a>
        </div>
        <div class="content-inner-flow">
            <h2 class="grayed-out" id="playing-status">OFFLINE</h2>
            <div class="current-game" id="current-game">
              <img class="current-game-logo" id="current-game-logo"></img>
              <h3 id="current-game-name" style="color: #4af626"></h3>
            </div>
            <h2 style="color: #4af626;">Most played games</h2>
            <div class="current-game" id="first-game">
              <img class="current-game-logo" id="first-game-logo"></img>
              <h3 id="first-game-name" style="color: #4af626"></h3>
              <h3 id="first-game-hours" style="color: #4af626"></h3>
            </div>
            <div class="current-game" id="second-game">
              <img class="current-game-logo" id="second-game-logo"></img>
              <h3 id="second-game-name" style="color: #4af626"></h3>
              <h3 id="second-game-hours" style="color: #4af626"></h3>
            </div>
            <div class="current-game" id="third-game">
              <img class="current-game-logo" id="third-game-logo"></img>
              <h3 id="third-game-name" style="color: #4af626"></h3>
              <h3 id="third-game-hours" style="color: #4af626"></h3>
            </div>
        </div>
      </article>
    </main>
    <footer class="footer">
      <div class="footer-content">
        <marquee>
          <p style="color: #da019d">
            Copyright © 2026 Anh's Homepage. All rights reserved.
          </p>
        </marquee>
        <nav aria-label="contacts" class="footer-links">
          <a
            href="https://www.linkedin.com/in/anh-khoa-vu"
            target="_blank"
            rel="noopener noreferrer"
          >
            <picture>
              <img
                src="/images/linkedin.png"
                alt="LinkedIn"
                height="40px"
                width="40px"
              />
            </picture>
          </a>
          <a
            href="https://github.com/codingpog"
            target="_blank"
            rel="noopener noreferrer"
          >
            <picture>
              <source
                srcset="/images/github.gif"
                media="(prefers-reduced-motion: no-preference)"
              />
              <img
                src="/images/github.png"
                alt="GitHub"
                height="40px"
                width="40px"
              />
            </picture>
          </a>
        </nav>
      </div>
    </footer>
    <script src="/js/app.js"></script>
  </body>
</html>
